aid: google-cloud-kms
name: Google Cloud KMS
description: >-
  Google Cloud Key Management Service (KMS) allows you to create, import, and
  manage cryptographic keys and perform cryptographic operations in a central
  cloud service. It supports encryption, decryption, signing, and verification
  using symmetric and asymmetric keys for securing data and workloads.
